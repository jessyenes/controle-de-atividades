<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Controle de Atividades</title>

    <meta name="description" content="Sistema para controle de atividades diárias com acompanhamento de produtividade.">

    <link rel="stylesheet" href="css/styles.css">

    <script src="js/script.js" defer></script>
</head>

<body>

    <header class="header">
        <h1 class="logo">📊 Controle</h1>
    </header>

    <main class="login-wrapper">

        <section class="login-card">

            <h1 class="login-title">LOGIN</h1>
            <p class="subtitle">Acesse sua conta para continuar</p>

            <form id="loginForm" autocomplete="on">

                <div class="form-group">
                    <label for="matricula">Matrícula</label>
                    <input 
                        type="text" 
                        id="matricula"
                        name="matricula" 
                        placeholder="Ex: 123 ou jessica"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input 
                        type="password" 
                        id="senha"
                        name="senha" 
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn-primary">
                    Entrar
                </button>

            </form>

            <div id="toast" class="toast"></div>

        </section>

    </main>

    <footer class="footer">
        <p>&copy; 2026 - Controle de Atividades</p>
    </footer>

</body>
</html>
