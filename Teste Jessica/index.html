<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Atividades Diárias</title>

    <!-- SEO -->
    <meta name="description" content="Aplicativo para controle de atividades diárias, ajudando você a organizar tarefas e aumentar produtividade.">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- JS -->
    <script src="js/script.js" defer></script>
</head>

<body>

    <!-- Cabeçalho -->
    <header class="header">
        <h1 class="logo">📊 Controle</h1>

        <!-- BOTÃO MOBILE -->
        <button class="menu-toggle" id="menuToggle">☰</button>

        <nav aria-label="Menu principal" id="menu">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link ativo">Início</a></li>
                <li><a href="pages/page2.html" class="nav-link">Registrar</a></li>
                <li><a href="pages/historico.html" class="nav-link">Histórico</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo principal -->
    <main class="login-wrapper">
        <div class="login-card">
            <h1>📊 Controle de Atividades</h1>
            <p class="subtitle">Organize e acompanhe suas atividades diárias</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" name="username" placeholder="Digite seu usuário" required>
                </div>

                <div class="form-group">
                    <label>Unidade (UT)</label>
                    <select name="UT" required>
                        <option value="">Selecione...</option>
                        <option value="sobral">Sobral</option>
                        <option value="xambioa">Xambioá</option>
                        <option value="vidal_ramos">Vidal Ramos</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div id="toast" class="toast"></div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2026 - Todos os direitos reservados</p>
    </footer>

</body>
</html>
