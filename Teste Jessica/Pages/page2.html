<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estados | Controle</title>

    <link rel="stylesheet" href="../css/styles.css">

    <script src="../js/script.js" defer></script>
</head>

<body>

    <header class="header">
        <div class="header-content">
            <h1 class="logo">📊 Registro</h1>
            <span class="user-info">👤 <span id="nomeUsuario"></span></span>
        </div>

        <nav aria-label="Menu principal" id="menu">
            <ul class="nav-list">
                <li><a href="menu.html" class="nav-link">Início</a></li>
                <li><a href="historico.html" class="nav-link">Histórico</a></li>
                <li><button id="btnSair" class="btn-sair">Sair</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <h2 class="titulo-pagina">Registrar Estado Atual</h2>

        <section class="card">
            <h3>1. Selecione o estado</h3>
            
            <div id="atividades" class="grupo-atividades">
                <button class="list-item" data-parada="DDS">DDS</button>
                <button class="list-item" data-parada="Troca de Turno">Troca de Turno</button>
                <button class="list-item" data-parada="Refeição">Refeição</button>
                <button class="list-item" data-parada="Parada Pessoal">Parada Pessoal</button>
                <button class="list-item" data-parada="Manutenção">Manutenção</button>
                <button class="list-item" data-parada="Chuva">Chuva</button>
                <button class="list-item" data-parada="Neblina">Neblina</button>
                <button class="list-item" data-parada="Poeira">Poeira</button>
                <button class="list-item" data-parada="Acerto de Praça">Acerto de Praça</button>
                <button class="list-item" data-parada="Abastecimento">Abastecimento</button>
                <button class="list-item" data-parada="Aguardando Britador">Aguardando Britador</button>
                <button class="list-item" data-parada="Disponível">Disponível</button>
                <button class="list-item" data-parada="Limpeza de Báscula">Limpeza de Báscula</button>
                <button class="list-item" data-parada="Aguardando Carga">Aguardando Carga</button>
                <button class="list-item" data-parada="Falta de Frente">Falta de Frente</button>
                <button class="list-item" data-parada="Documentação">Documentação</button>
                <button class="list-item" data-parada="Fila">Fila</button>
                <button class="list-item" data-parada="Deslocamento">Deslocamento</button>
                <button class="list-item" data-parada="Detonação">Detonação</button>
                <button class="list-item" data-parada="Outro">Outro</button>
            </div>

            <p class="selecao-feedback">
                <strong>Estado:</strong> <span id="atividadeSelecionada" class="badge">Nenhum</span>
            </p>
        </section>

        <section class="card bloco-cronometro destaque">
            <h3>2. Controle de Tempo</h3>
            
            <div id="cronometro" class="cronometro-display">00:00:00</div>

            <div class="turno-acoes">
                <button id="btnIniciar" class="btn-primary">▶ Iniciar</button>
                <button id="btnParar" class="btn-secundario">🛑 Parar e Salvar</button>
                <button id="btnResetar" class="btn-reset">🔄 Reset</button>
            </div>
        </section>

        <section class="card">
            <h3>Informações da Sessão</h3>
            <div class="info-grid">
                <div class="info-box">
                    <span class="info-label">🕒 Início</span>
                    <span id="horaInicio" class="info-valor">--:--:--</span>
                </div>

                <div class="info-box">
                    <span class="info-label">🏁 Fim</span>
                    <span id="horaFim" class="info-valor">--:--:--</span>
                </div>

                <div class="info-box">
                    <span class="info-label">⏱ Duração</span>
                    <span id="duracao" class="info-valor">00:00:00</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <p>&copy; 2026 - Controle Operacional de Atividades</p>
    </footer>

    <div id="toast" class="toast">✅ Atividade salva com sucesso!</div>

</body>
</html>
