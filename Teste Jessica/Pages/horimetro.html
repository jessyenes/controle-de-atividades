<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horímetro | Controle</title>

    <link rel="stylesheet" href="../css/styles.css">
    
    <script src="../js/script.js" defer></script>
</head>

<body>

    <header class="header">
        <h1 class="logo">⏱️ Horímetro</h1>

        <div class="header-actions">
            <a href="equipamento.html" class="btn-voltar">← Voltar</a>
            <button id="btnSair" class="btn-sair">Sair</button>
        </div>
    </header>

    <main class="container">

        <h2 class="titulo-pagina">Passo Final: Leitura</h2>

        <section class="card">
            <h3 class="titulo-secao">Informe o Horímetro Inicial</h3>
            <p class="subtitle">Insira o valor atual indicado no painel do equipamento.</p>

            <div class="form-group">
                <label for="horimetroInicial">Valor do Horímetro</label>
                <input 
                    type="number" 
                    id="horimetroInicial" 
                    placeholder="Ex: 1234.5" 
                    step="0.1" 
                    min="0"
                    inputmode="decimal"
                    class="input-grande"
                >
            </div>

            <div id="feedbackHorimetro" class="selecao-feedback">
                <strong>Status:</strong> <span class="badge-vazio">Aguardando valor...</span>
            </div>
        </section>

        <div class="turno-acoes">
            <a href="equipamento.html" class="btn-secundario">← Voltar</a>
            
            <button id="btnProximoHorimetro" class="btn-primary" disabled>
                Finalizar e Iniciar →
            </button>
        </div>

    </main>

    <footer class="footer-minimal">
        <p>Sistema de Controle Operacional &copy; 2026</p>
    </footer>

</body>
</html>
